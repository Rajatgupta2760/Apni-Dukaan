<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

<h1>All Products</h1>

{% for product in products %}
    <div>
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <p>₹{{ product.price }}</p>

        {% if product.image %}
            <img src="{{ product.image.url }}" width="200">
        {% endif %}
        <hr>
    </div>
{% endfor %}

</body>
</html>
